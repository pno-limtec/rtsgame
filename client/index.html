<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Faultline Command — RTS</title>
<style>
  :root { --hud:#0d1117ee; --accent:#36c5f0; --line:#2a3340; --text:#cdd6e0; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:#05080c; color:var(--text);
    font-family: system-ui, "Segoe UI", sans-serif; user-select:none; }
  #game { position:fixed; inset:0; }
  canvas { display:block; }

  /* Ressourcenleiste oben: schmale, schwebende Pille statt Vollbalken */
  #topbar { position:fixed; top:8px; left:50%; transform:translateX(-50%); max-width:calc(100% - 24px);
    display:flex; gap:13px; align-items:center; padding:6px 14px; background:var(--hud);
    border:1px solid var(--line); border-radius:9px; font-size:13px; z-index:10; white-space:nowrap;
    box-shadow:0 3px 14px #0008; }
  #topbar .res { display:flex; gap:5px; align-items:center; }
  #topbar .res b { color:#fff; font-variant-numeric:tabular-nums; }
  #topbar .weather { gap:6px; }
  #topbar .forecast { display:flex; align-items:center; gap:3px; opacity:.78; max-width:64px; overflow:hidden; }
  #topbar .wstep { font-size:12px; line-height:1; }
  #topbar .wtime { font-size:11px; color:#b8c5d4; font-variant-numeric:tabular-nums; }
  #topbar .topaction { height:22px; padding:0 7px; background:#161d27; border:1px solid var(--line);
    color:#eef6ff; border-radius:4px; cursor:pointer; font-size:11px; }
  #topbar .topaction:hover, #topbar .topaction.active { border-color:var(--accent); color:#eafcff; }
  .svgicon { width:16px; height:16px; display:inline-block; flex:0 0 auto; vertical-align:-3px; color:currentColor; }
  .topicon, .ricon { color:#eaf6ff; }
  .tinyicon { width:13px; height:13px; color:#c8d6e6; }
  .costlist { display:inline-flex; align-items:center; gap:5px; min-width:0; }
  .costlist.multi { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
  .costitem { display:inline-flex; align-items:center; gap:3px; margin-right:4px; font-weight:650; }
  .costlist.multi .costitem { margin-right:0; }
  .costicon { width:13px; height:13px; flex:0 0 13px; color:currentColor; vertical-align:-2px; }
  .roleicon { width:13px; height:13px; vertical-align:-2px; }
  #topbar .dot { width:9px;height:9px;border-radius:50%; }
  #topbar .sep { width:1px; align-self:stretch; background:var(--line); }
  #topbar .res[data-res] { padding:3px 6px; border:1px solid color-mix(in srgb, var(--res-color) 52%, #18202a);
    border-radius:5px; background:color-mix(in srgb, var(--res-color) 14%, #101722); }
  #topbar .res[data-res] .ricon, #topbar .res[data-res] b { color:var(--res-color); }
  .low { color:#ff6b6b !important; }

  #menubtn { position:fixed; left:8px; top:8px; z-index:15; display:flex; align-items:center; gap:6px;
    height:32px; padding:0 10px; background:var(--hud); border:1px solid var(--line); color:#eef6ff;
    border-radius:7px; box-shadow:0 3px 14px #0008; cursor:pointer; font-size:12px; }
  #menubtn:hover, #menubtn[aria-expanded="true"] { border-color:var(--accent); }
  #gamemenu { position:fixed; inset:0; z-index:60; display:none; align-items:flex-start; justify-content:flex-start;
    padding:48px 0 0 8px; background:#02060a66; }
  #gamemenu.open { display:flex; }
  #gamemenu .panel { width:min(360px, calc(100vw - 16px)); background:#0d1117f5; border:1px solid var(--line);
    border-radius:8px; padding:12px; box-shadow:0 12px 36px #000b; }
  #gamemenu .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
  #gamemenu h2 { margin:0; font-size:15px; color:#fff; }
  #gamemenu .close { width:28px; height:28px; display:grid; place-items:center; background:#161d27;
    border:1px solid var(--line); color:#dbe7f4; border-radius:5px; cursor:pointer; }
  #gamemenu .menuactions { display:grid; gap:6px; }
  #gamemenu .menuactions button { display:flex; align-items:center; gap:8px; width:100%; min-height:34px;
    background:#161d27; border:1px solid var(--line); color:#edf5ff; border-radius:5px; padding:7px 9px;
    cursor:pointer; text-align:left; font-size:12px; }
  #gamemenu .menuactions button:hover, #gamemenu .close:hover { border-color:var(--accent); }
  #gamemenu .gfx { margin-top:11px; padding-top:10px; border-top:1px solid var(--line); display:grid; gap:8px; }
  #gamemenu .gfx h3 { margin:0; font-size:11px; color:#8fa0b8; text-transform:uppercase; letter-spacing:.55px; }
  #gamemenu .gfx label { display:flex; align-items:center; justify-content:space-between; gap:14px; font-size:12px; color:#c9d5e2; }
  #gamemenu .gfx input { width:16px; height:16px; accent-color:var(--accent); }
  #menustatus { min-height:16px; margin-top:9px; font-size:11px; color:#8fa0b8; }

  #techtree { position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
    padding:28px; background:#02060acc; }
  #techtree.open { display:flex; }
  #techtree .techpanel { width:min(1180px, calc(100vw - 32px)); height:min(760px, calc(100vh - 32px));
    background:#0d1117f7; border:1px solid var(--line); border-radius:8px; box-shadow:0 18px 50px #000d;
    display:grid; grid-template-rows:auto minmax(0,1fr); overflow:hidden; }
  #techtree .techhead { display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 14px; border-bottom:1px solid var(--line); }
  #techtree h2 { margin:0; font-size:15px; color:#fff; }
  #techtree .techsub { margin-top:2px; font-size:11px; color:#8fa0b8; }
  #techtree .close { width:30px; height:30px; display:grid; place-items:center; background:#161d27;
    border:1px solid var(--line); color:#dbe7f4; border-radius:5px; cursor:pointer; }
  #techtree .close:hover { border-color:var(--accent); }
  #techtree .techbody { min-height:0; display:grid; grid-template-columns:minmax(0,1fr) 340px; }
  #techmap { min-width:0; overflow:auto; padding:12px; border-right:1px solid var(--line); }
  .techsection { margin-bottom:14px; }
  .techsection h3, .techdetail h3 { margin:0 0 8px; font-size:11px; color:#8fa0b8; text-transform:uppercase; letter-spacing:.55px; }
  .techlane { display:grid; grid-template-columns:112px minmax(0,1fr); align-items:start; gap:10px;
    margin-bottom:8px; padding:8px; background:#0a0f16; border:1px solid #1b2532; border-radius:6px; }
  .techlane-title { color:#dce8f5; font-size:12px; font-weight:600; padding-top:9px; }
  .technodes { min-width:0; display:flex; flex-wrap:wrap; align-items:stretch; gap:8px 14px; }
  .technode { position:relative; width:214px; min-height:96px; display:grid; grid-template-columns:88px minmax(0,1fr);
    align-items:center; gap:8px; padding:7px; background:#151c26; border:1px solid #2a3340; color:var(--text);
    border-radius:6px; cursor:pointer; text-align:left; }
  .technode:not(:last-child)::after { content:""; position:absolute; right:-12px; top:50%; width:10px; height:1px; background:#36465a; }
  .technode:hover, .technode.selected { border-color:var(--accent); background:#10212b; }
  .technode .techicon { width:28px; height:28px; display:grid; place-items:center; color:#eaf6ff;
    background:#0d141d; border:1px solid #2a3340; border-radius:5px; }
  .technode .techicon .svgicon { width:18px; height:18px; }
  .techthumb, .bthumb, .detailpreview { position:relative; display:grid; place-items:center; overflow:hidden;
    background:#0b121b; border:1px solid #243244; border-radius:6px; }
  .modelpreview { display:block; width:100%; height:100%; object-fit:contain; image-rendering:auto; }
  .techthumb { width:88px; height:74px; }
  .techthumb .techicon.mini, .bthumb .bicon.mini, .detailpreview .detailicon.mini {
    position:absolute; right:2px; bottom:2px; width:16px; height:16px; min-width:0; border-radius:4px;
    background:#08111acc; border:1px solid #314258; color:#dff5ff; padding:0; display:grid; place-items:center; }
  .techthumb .techicon.mini .svgicon, .bthumb .bicon.mini .svgicon, .detailpreview .detailicon.mini .svgicon {
    width:11px; height:11px; }
  .technode .techlabel { display:block; color:#f0f6fd; font-size:11.5px; line-height:1.15; overflow:hidden; text-overflow:ellipsis; }
  .technode .techmeta { display:block; margin-top:3px; color:#8fa0b8; font-size:9.5px; line-height:1.15; }
  #techdetail { overflow:auto; padding:12px 14px; background:#0a0f16; }
  .techdetail .detailtop { display:grid; grid-template-columns:110px minmax(0,1fr); gap:10px; align-items:center; margin-bottom:10px; }
  .techdetail .detailpreview { width:110px; height:84px; }
  .techdetail .detailicon { width:38px; height:38px; display:grid; place-items:center; background:#151c26;
    border:1px solid var(--line); border-radius:6px; color:#eef8ff; }
  .techdetail .detailicon .svgicon { width:24px; height:24px; }
  .techdetail .title { color:#fff; font-size:16px; font-weight:700; line-height:1.1; }
  .techdetail .kind { color:#8fa0b8; font-size:11px; margin-top:3px; }
  .techstats { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin:8px 0 12px; }
  .techstat { background:#151c26; border:1px solid #202936; border-radius:5px; padding:5px 6px; font-size:11px; }
  .techstat b { display:block; color:#fff; font-size:12px; margin-bottom:1px; }
  .techpara { margin:0 0 10px; font-size:12px; line-height:1.35; color:#cdd6e0; }
  .techlist { margin:0 0 12px; padding-left:16px; color:#cdd6e0; font-size:12px; line-height:1.35; }
  .techlist li { margin-bottom:4px; }
  .techchips { display:flex; flex-wrap:wrap; gap:4px; margin:4px 0 12px; }
  .techchip { display:inline-flex; align-items:center; gap:3px; max-width:100%; background:#151c26; border:1px solid #202936;
    border-radius:4px; padding:3px 6px; font-size:10.5px; color:#b8c5d4; }

  #helppanel { position:fixed; top:54px; left:50%; transform:translateX(-50%); z-index:14;
    width:min(380px, calc(100vw - 16px)); background:#0d1117f2; border:1px solid var(--line);
    border-radius:8px; box-shadow:0 8px 28px #000b; padding:10px 12px; font-size:12px; }
  #helppanel[hidden] { display:none; }
  #helppanel .advisorhead { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px; }
  #helppanel .advisorhead b { color:#fff; font-size:13px; }
  #helppanel .advisortype { color:#8fa0b8; font-size:10.5px; text-transform:uppercase; letter-spacing:.45px; }
  #helppanel .advisoritem { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  #helppanel .advisoricon { width:30px; height:30px; display:grid; place-items:center; background:#151c26;
    border:1px solid #2a3340; border-radius:5px; color:#eaf6ff; flex:0 0 auto; }
  #helppanel .advisoricon .svgicon { width:19px; height:19px; }
  #helppanel .advisorlabel { color:#f0f7ff; font-size:14px; font-weight:700; line-height:1.1; }
  #helppanel .advisorcost { margin-top:3px; color:#9aa7bd; font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #helppanel .advisorwhy { margin:0; color:#cdd6e0; line-height:1.35; }
  #helppanel .advisorwhy b { color:#fff; }
  #helppanel .advisornote { margin-top:6px; color:#8fa0b8; font-size:11px; line-height:1.3; }

  @media (max-width: 820px) {
    #techtree { padding:8px; align-items:stretch; }
    #techtree .techpanel { width:100%; height:100%; }
    #techtree .techbody { grid-template-columns:1fr; grid-template-rows:minmax(0,1fr) minmax(220px, 38vh); }
    #techmap { border-right:0; border-bottom:1px solid var(--line); }
    .techlane { grid-template-columns:1fr; gap:6px; }
    .techlane-title { padding-top:0; }
    .technode { width:178px; grid-template-columns:74px minmax(0,1fr); }
    .techthumb { width:74px; height:62px; }
  }

  /* Bauleiste rechts: schwebendes Panel, nur so hoch wie nötig, 2-spaltige Buttons */
  #buildbar { position:fixed; right:8px; top:54px; width:min(390px, calc(100vw - 16px)); max-height:calc(100vh - 200px);
    background:var(--hud); border:1px solid var(--line); border-radius:9px; overflow-y:auto; overflow-x:hidden;
    padding:8px; z-index:10; box-shadow:0 3px 14px #0008; }
  #buildbar:empty { display:none; }
  #buildbar .buildtabs { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:3px; margin-bottom:7px; }
  #buildbar .buildtab { display:flex; align-items:center; justify-content:center; gap:4px; min-width:0; height:28px;
    background:#111822; border:1px solid var(--line); color:#aeb9c7; border-radius:5px; cursor:pointer; font-size:10.5px; }
  #buildbar .buildtab[aria-selected="true"] { border-color:var(--accent); background:#10212b; color:#eefbff; }
  #buildbar .buildtab .svgicon { width:13px; height:13px; }
  #buildbar .buildpanel { min-height:0; }
  #buildbar .grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:3px; }
  .bbtn { position:relative; display:grid; grid-template-columns:74px minmax(0,1fr); align-items:center; gap:7px; text-align:left; padding:5px 6px; cursor:pointer; line-height:1.15;
    min-width:0; min-height:76px; background:#161d27; color:var(--text); border:1px solid var(--line); border-radius:5px; font-size:11px; overflow:hidden; }
  .bbtn:hover { border-color:var(--accent); }
  .bbtn:disabled { opacity:.4; cursor:not-allowed; }
  /* C&C-Baufortschritt: das vordere Item füllt den Knopf von unten nach oben. */
  .bbtn .bprog { position:absolute; left:0; right:0; bottom:0; height:0; pointer-events:none;
    background:linear-gradient(to top, rgba(70,200,255,.30), rgba(70,200,255,.10)); border-top:1px solid var(--accent);
    transition:height .18s linear; opacity:0; }
  .bbtn.producing .bprog { opacity:1; }
  /* Warteschlangen-Anzahl als Zähler-Badge oben rechts. */
  .bbtn .bqty { position:absolute; top:3px; right:3px; min-width:15px; height:15px; padding:0 3px; box-sizing:border-box;
    display:none; align-items:center; justify-content:center; border-radius:8px; background:var(--accent); color:#04222e;
    font-size:10px; font-weight:700; line-height:1; box-shadow:0 1px 3px rgba(0,0,0,.5); }
  .bbtn.producing .bqty { display:flex; }
  .bbtn .bicon { width:20px; height:20px; flex:0 0 20px; display:grid; place-items:center;
    background:#0d141d; border:1px solid #2a3340; border-radius:4px; color:#eaf6ff; }
  .bbtn .bicon .svgicon { width:15px; height:15px; }
  .bbtn .bthumb { width:74px; height:64px; }
  .bbtn .bmeta { min-width:0; display:block; }
  .bbtn .blabel { display:block; color:#eef4fa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bbtn .cost { display:block; color:#9aa7bd; font-size:10.5px; white-space:normal; overflow:visible; text-overflow:clip; margin-top:3px; }
  .bbtn.armed { border-color:var(--accent); background:#10212b; }
  .bbtn.armed .bicon { border-color:var(--accent); color:#9eeaff; }

  /* Minimap + Auswahl: schwebende Panels unten links (kein durchgehender Leerbalken mehr) */
  #minimap { position:fixed; left:8px; bottom:8px; width:172px; height:128px; background:#08111a;
    border:1px solid var(--line); border-radius:9px; z-index:10; box-shadow:0 3px 14px #0008; }
  #selpanel { position:fixed; left:188px; bottom:8px; max-width:420px; background:var(--hud);
    border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-size:12px; z-index:10;
    box-shadow:0 3px 14px #0008; }
  #selpanel.empty { display:none; }
  #selpanel .title { color:#fff; margin-bottom:4px; }
  #selgrid { display:flex; flex-wrap:wrap; gap:3px; }
  #selgrid .chip { background:#161d27; border:1px solid var(--line); border-radius:3px; padding:2px 6px; font-size:11px; }
  #selgrid .rolebar { flex-basis:100%; display:flex; gap:4px; margin-top:5px; }
  #selgrid .rolebtn { background:#161d27; border:1px solid var(--line); color:var(--text); border-radius:4px;
    padding:4px 6px; font-size:11px; cursor:pointer; }
  #selgrid .rolebtn:hover, #selgrid .rolebtn.active { border-color:var(--accent); color:#eaf8ff; }

  /* Warnungen */
  #warn { position:fixed; left:50%; top:44px; transform:translateX(-50%); z-index:20; display:flex; flex-direction:column; gap:4px; align-items:center; }
  .warnmsg { background:#3a1414cc; border:1px solid #ff6b6b; color:#ffd2d2; padding:4px 12px; border-radius:4px; font-size:12px; animation:fade 4s forwards; }
  @keyframes fade { 0%,70%{opacity:1} 100%{opacity:0} }

  /* Lobby-Overlay */
  #lobby { position:fixed; inset:0; background:#05080cdd; z-index:50; display:flex; align-items:center; justify-content:center; }
  #lobby .card { background:#0d1117; border:1px solid var(--line); border-radius:8px; padding:18px; width:min(560px, calc(100vw - 20px)); max-height:calc(100vh - 24px); overflow:auto; }
  #lobby .brand { display:grid; justify-items:center; gap:3px; margin:0 0 8px; }
  #lobby .logo { width:min(330px, 82vw); height:auto; display:block; }
  #lobby h1 { margin:0; font-size:1px; color:transparent; }
  #lobby .sub { color:#7d8aa0; font-size:13px; margin-bottom:16px; }
  #lobby label { display:block; font-size:12px; margin:10px 0 4px; color:#9aa7bd; }
  #lobby input, #lobby select { width:100%; padding:8px; background:#161d27; border:1px solid var(--line); color:#fff; border-radius:4px; }
  #lobby button { margin-top:18px; width:100%; padding:10px; background:var(--accent); color:#04121a; border:none;
    border-radius:5px; font-weight:600; cursor:pointer; font-size:14px; }
  #lobby .watchbtn { margin-top:8px; background:#161d27; color:#dbe7f4; border:1px solid var(--line); }
  #seatlist { margin-top:12px; font-size:12px; }
  #seatlist .seat { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--line); }
  #lobby .lobbytabs { display:grid; grid-template-columns:1fr 1fr; gap:0; margin:14px 0 0; padding:4px 4px 0;
    background:#070d15; border:1px solid #263548; border-bottom:none; border-radius:8px 8px 0 0; }
  #lobby .lobbytab { margin:0; height:34px; background:#101722; border:1px solid transparent; border-bottom-color:#263548;
    color:#9caec4; border-radius:5px 5px 0 0; cursor:pointer; font-size:12px; box-shadow:none; }
  #lobby .lobbytab + .lobbytab { margin-left:4px; }
  #lobby .lobbytab[aria-selected="true"] { border-color:var(--accent); border-bottom-color:#0b121b;
    background:#0b121b; color:#eefbff; box-shadow:0 -1px 10px #36c5f022; }
  #lobby .lobbypanel[hidden] { display:none; }
  #lobby .lobbypanel { padding:12px; background:#0b121b; border:1px solid #263548; border-radius:0 0 8px 8px;
    box-shadow:inset 0 1px 0 #36c5f016; }
  #lobby .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  #lobby .segmented { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:4px; }
  #lobby .segmented button { margin:0; width:auto; padding:8px; background:#161d27; color:#dbe7f4; border:1px solid var(--line); }
  #lobby .segmented button[aria-pressed="true"] { border-color:var(--accent); background:#10212b; color:#eefbff; }
  #gamelist { margin-top:10px; display:grid; gap:5px; max-height:220px; overflow:auto; }
  #gamelist .gamerow { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; align-items:center;
    padding:7px 8px; background:#111822; border:1px solid var(--line); border-radius:5px; font-size:12px; }
  #gamelist .gmeta { color:#8fa0b8; font-size:11px; }
  #gamelist button { margin:0; width:auto; padding:6px 9px; font-size:12px; }
  #lobbystatus { min-height:16px; margin-top:8px; color:#8fa0b8; font-size:12px; }
  #spectatorbar { position:fixed; right:8px; top:54px; z-index:12; display:none; flex-direction:column; align-items:stretch; gap:4px;
    background:var(--hud); border:1px solid var(--line); border-radius:7px; padding:4px 5px; box-shadow:0 3px 14px #0008;
    font-size:11px; color:#aeb9c7; width:min(420px, calc(100vw - 16px)); }
  #spectatorbar .spec-tabs { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:3px; }
  #spectatorbar .spec-tab { display:flex; align-items:center; justify-content:center; gap:4px; height:24px;
    background:#111822; border:1px solid var(--line); color:#aeb9c7; border-radius:4px; cursor:pointer; font-size:10.5px; }
  #spectatorbar .spec-tab[aria-selected="true"] { border-color:var(--accent); background:#10212b; color:#eefbff; }
  #spectatorbar .spec-panel { display:flex; align-items:center; gap:3px; min-width:0; }
  #spectatorbar .spec-panel[hidden] { display:none; }
  #spectatorbar select { max-width:126px; background:#161d27; border:1px solid var(--line); color:#fff; border-radius:4px; padding:3px 5px; font-size:11px; }
  #spectatorbar button { background:#161d27; border:1px solid var(--line); color:#fff; border-radius:4px; padding:3px 6px;
    cursor:pointer; font-size:11px; min-width:0; }
  #spectatorbar button:hover { border-color:var(--accent); }
  #spectatorbar button:disabled { opacity:.45; cursor:not-allowed; }
  #spectatorbar .spec-iconbtn { display:inline-flex; align-items:center; justify-content:center; gap:4px; min-height:24px; }
  #spectatorbar .spec-segments { display:inline-grid; grid-auto-flow:column; grid-auto-columns:minmax(46px,1fr); gap:2px; min-width:0; }
  #spectatorbar .spec-segments button { padding:3px 4px; }
  #spectatorbar .spec-segments button[aria-pressed="true"] { border-color:var(--accent); background:#10212b; color:#eefbff; }
  #spectatorbar .svgicon { width:13px; height:13px; }
  #spectatorevents { display:flex; flex-wrap:nowrap; gap:2px; }
  #spectatorevents[hidden] { display:none; }
  #spectatorevents button { padding:3px 5px; }
  #lobby .lobbyopt { display:flex; align-items:center; justify-content:flex-start; width:fit-content; gap:8px; margin:10px 0 4px; font-size:12px; color:#aeb9c7; }
  #lobby .lobbyopt input[type="checkbox"] { flex:0 0 auto; width:15px; height:15px; padding:0; margin:0; accent-color:var(--accent); }
  #lobby .lobbyopt span { line-height:1.25; }
  #lobby .lobbyselect { width:100%; justify-content:space-between; }
  #lobby .lobbyselect select { width:auto; min-width:190px; padding:5px 6px; font-size:12px; }
  #scoreboard { position:fixed; left:8px; bottom:142px; width:172px; z-index:9;
    background:var(--hud); border:1px solid var(--line); border-radius:7px; padding:5px 6px;
    box-shadow:0 3px 14px #0008; font-size:11px; color:#cdd6e0; }
  #scoreboard:empty { display:none; }
  #scoreboard .score-row { display:grid; grid-template-columns:9px minmax(0,1fr) auto; align-items:center; gap:5px; min-height:17px; }
  #scoreboard .score-dot { width:7px; height:7px; border-radius:50%; }
  #scoreboard .score-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #scoreboard .score-value { color:#fff; font-variant-numeric:tabular-nums; font-weight:700; }
  #joincodehud { position:fixed; left:8px; bottom:calc(142px + 112px); width:172px; z-index:9;
    background:var(--hud); border:1px solid var(--line); border-radius:7px; padding:6px;
    box-shadow:0 3px 14px #0008; font-size:11px; color:#8fa0b8; }
  #joincodehud:empty { display:none; }
  #joincodehud b { display:block; color:#fff; font-size:15px; letter-spacing:.8px; margin-top:2px; }
</style>
</head>
<body>
  <div id="game"></div>

  <button id="menubtn" type="button" aria-expanded="false" title="Spielmenü">☰ Menü</button>
  <div id="topbar"></div>
  <div id="helppanel" hidden aria-live="polite"></div>
  <div id="buildbar"></div>
  <canvas id="minimap" width="172" height="128"></canvas>
  <div id="selpanel" class="empty"><div class="title">Keine Auswahl</div><div id="selgrid"></div></div>
  <div id="warn"></div>
  <div id="gamemenu" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true" aria-labelledby="menutitle">
      <div class="head">
        <h2 id="menutitle">Spielmenü</h2>
        <button class="close" type="button" data-close-menu title="Menü schließen">×</button>
      </div>
      <div class="menuactions">
        <button id="menunew" type="button">Neues Spiel</button>
        <button id="menunewsame" type="button">Neues Spiel (gleiche Karte)</button>
        <button id="menusave" type="button">Spielstand sichern</button>
        <button id="menuload" type="button">Spielstand laden</button>
        <button id="menutechtree" type="button">Tech-Tree anzeigen</button>
      </div>
      <div class="gfx">
        <h3>Grafikeinstellungen</h3>
        <label><span>Schatten</span><input id="gfxshadows" type="checkbox" checked></label>
        <label><span>Dynamische Lichter</span><input id="gfxlights" type="checkbox" checked></label>
        <label><span>Wasser V2 (Ozean-Shader)</span><input id="gfxwasserv2" type="checkbox"></label>
      </div>
      <div class="gfx">
        <h3>Ton</h3>
        <label><span>Musik</span><input id="audiomusic" type="checkbox" checked></label>
        <label><span>Soundeffekte</span><input id="audiosfx" type="checkbox" checked></label>
      </div>
      <div id="menustatus" aria-live="polite"></div>
      <input id="loadsavefile" type="file" accept="application/json,.json" hidden>
    </div>
  </div>
  <div id="techtree" aria-hidden="true">
    <div class="techpanel" role="dialog" aria-modal="true" aria-labelledby="techtreetitle">
      <div class="techhead">
        <div>
          <h2 id="techtreetitle">Einheiten- und Gebäude-Tech-Tree</h2>
          <div class="techsub">Knoten anklicken für Rolle, Werte, Vorteile und Schwächen</div>
        </div>
        <button class="close" type="button" data-close-tech title="Tech-Tree schließen">×</button>
      </div>
      <div class="techbody">
        <div id="techmap"></div>
        <div id="techdetail" class="techdetail" aria-live="polite"></div>
      </div>
    </div>
  </div>
  <div id="joincodehud" aria-live="polite"></div>
  <div id="scoreboard" aria-live="polite"></div>

  <div id="lobby">
    <div class="card">
      <div class="brand">
        <img class="logo" src="/client/assets/logo-faultline-command.png" alt="Faultline Command">
        <h1>Faultline Command</h1>
      </div>
      <div class="sub">Industrielles Echtzeitstrategie-Gefecht</div>
      <label>Spielername</label>
      <input id="pname" value="Kommandant" maxlength="16">
      <div class="lobbytabs" role="tablist" aria-label="Spielstart">
        <button class="lobbytab" type="button" data-lobbytab="join" aria-selected="true">Spiel beitreten</button>
        <button class="lobbytab" type="button" data-lobbytab="create" aria-selected="false">Spiel erstellen</button>
      </div>
      <div id="joinpanel" class="lobbypanel" data-lobbypanel="join">
        <div class="row2">
          <label>Privater Beitrittscode<input id="joincode" maxlength="8" autocomplete="off"></label>
          <button id="joincodebtn" type="button">Code beitreten</button>
        </div>
        <div id="gamelist" aria-live="polite"></div>
      </div>
      <div id="createpanel" class="lobbypanel" data-lobbypanel="create" hidden>
        <div class="row2">
          <label>Spieltyp
            <select id="visibilitystart">
              <option value="public">Öffentliches Spiel</option>
              <option value="private">Privates Spiel</option>
            </select>
          </label>
          <label>Spieler
            <select id="slotstart">
              <option value="2" selected>2 Spieler</option>
              <option value="3">3 Spieler</option>
              <option value="4">4 Spieler</option>
            </select>
          </label>
        </div>
        <label>Startmodus</label>
        <div class="segmented" id="startmodeseg">
          <button type="button" data-startmode="instant" aria-pressed="true">Sofort loslegen</button>
          <button type="button" data-startmode="wait" aria-pressed="false">Auf andere Spieler warten</button>
        </div>
        <label class="lobbyopt" title="Karte bleibt sichtbar, aber außerhalb eigener Sicht grau. Gegner werden nur in Sichtweite eindeutig angezeigt.">
          <span>Nebel des Krieges aktivieren</span>
          <input id="fowstart" type="checkbox" checked>
        </label>
        <label class="lobbyopt" title="Wenn aktiv, läuft die Tageszeit automatisch weiter. Wenn aus, startet und bleibt die Partie bei Tag.">
          <span>Tag/Nacht Zyklus aktivieren</span>
          <input id="daynightstart" type="checkbox" checked>
        </label>
        <label class="lobbyopt lobbyselect" title="Steuert, wie häufig und hart Wetter, Beben, Rutschungen und andere Naturereignisse zuschlagen.">
          <span>Level of Insanity</span>
          <select id="insanitystart">
            <option value="1">Easy-Peasy</option>
            <option value="2" selected>Spicy Weather</option>
            <option value="3">Mother Nature is angry</option>
            <option value="4">Nature fucks you hard</option>
          </select>
        </label>
        <button id="creategamebtn" type="button">Spiel erstellen</button>
      </div>
      <select id="seatsel" hidden></select>
      <div id="seatlist" hidden></div>
      <button id="joinbtn" hidden>Match beitreten</button>
      <button id="watchbtn" class="watchbtn" hidden>Zuschauen</button>
      <div id="lobbystatus" aria-live="polite"></div>
    </div>
  </div>
  <div id="spectatorbar">
    <div class="spec-tabs" role="tablist" aria-label="Zuschauer">
      <button class="spec-tab" type="button" data-spectab="control" aria-selected="true">Sicht/Sim</button>
      <button class="spec-tab" type="button" data-spectab="events" aria-selected="false">Events</button>
    </div>
    <div class="spec-panel" data-specpanel="control">
      <select id="viewselsel"></select>
      <button id="spectatortakeover" type="button" hidden>Übernehmen</button>
      <button id="spectatorspeed" type="button" hidden>Tempo x1</button>
      <span id="spectatortime" class="spec-segments" hidden aria-label="Tageszeit">
        <button type="button" data-spectatortime="auto">Auto</button>
        <button type="button" data-spectatortime="day">Tag</button>
        <button type="button" data-spectatortime="night">Nacht</button>
      </span>
    </div>
    <div class="spec-panel" data-specpanel="events" hidden>
      <span id="spectatorevents" hidden>
        <button type="button" data-spectatorevent="rain" title="Regenschauer beim aktuell stärkeren Spieler auslösen">Regen</button>
        <button type="button" data-spectatorevent="drought" title="Extreme Dürre auslösen">Dürre</button>
        <button type="button" data-spectatorevent="landslide" title="Zufälligen Hangrutsch mit Stärke-Bias auslösen">Rutsch</button>
        <button type="button" data-spectatorevent="quake" title="Erdbeben beim aktuell stärkeren Spieler auslösen">Beben</button>
        <button type="button" data-spectatorevent="storm" title="Gewitter mit erhöhtem Blitzrisiko auslösen">Sturm</button>
        <button type="button" data-spectatorevent="fog" title="Nebel auslösen">Nebel</button>
      </span>
    </div>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  } }
  </script>
  <script type="module" src="/client/js/main.js"></script>
</body>
</html>
